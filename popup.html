<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio-Booster</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <header id="popup-header" role="banner">
        <h1>Audio Booster</h1>
    </header>
    <div id="gain">
        <label for="gainRange">Gain:</label>
        <input type="range" id="gainRange" min="0" max="6" step="0.1" value="1" aria-label="Gain Control">
        <span id="gainValue"></span>
    </div>

    <div id="pan">
        <label for="panRange">Pan:</label>
        <input type="range" id="panRange" min="-1" max="1" step="0.1" value="0" aria-label="Pan Control">
        <span id="panValue"></span>
    </div>

    <div id="audio-sides">
        <input type="checkbox" id="monoCheckbox">
        <label for="monoCheckbox">Mono</label>

        <input type="checkbox" id="flipCheckbox">
        <label for="flipCheckbox">Flip</label>
    </div>

    <div id="note">
        <p>Note: May not work on websites having cross-origin restrictions</p>
    </div>

    <div id="quick-controllers">
        <button id="muteButton" class="actions"></button>

        <button id="resetButton" class="actions">Reset</button>

        <button id="themeToggle" class="actions">Theme</button>

        <img src="assets/github_logo.png" alt="GitHub" id="githubLogo">
    </div>


    <script src="popup.js"></script>
</body>

</html>
